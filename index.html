<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex">
<title>FareScout</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛩️</text></svg>">
<style>
:root {
  --bg:#f4f6fa; --card:#fff; --text:#16202e; --muted:#6b7787; --line:#e3e8f0;
  --accent:#2563eb; --accent-soft:#eaf1ff; --green:#0f9d58; --green-soft:#e6f6ee;
  --red:#d93025; --amber:#b45309; --amber-soft:#fdf3e0;
  --shadow:0 1px 3px rgba(22,32,46,.08),0 4px 14px rgba(22,32,46,.06);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg:#0e1420; --card:#17202f; --text:#e8edf5; --muted:#8fa0b5; --line:#263248;
    --accent:#5c92ff; --accent-soft:#1c2a45; --green:#34c384; --green-soft:#12301f;
    --red:#ff6b5e; --amber:#f0b429; --amber-soft:#33270e;
    --shadow:0 1px 3px rgba(0,0,0,.4),0 6px 18px rgba(0,0,0,.3);
  }
}
* { box-sizing:border-box; margin:0; }
body { font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg); color:var(--text); min-height:100vh; }
header { display:flex; align-items:center; gap:10px; padding:16px 18px; }
.logo { font-size:20px; font-weight:750; letter-spacing:-.02em; display:flex; align-items:center; gap:9px; }
.logo .mark { width:28px; height:28px; border-radius:8px; background:linear-gradient(135deg,var(--accent),#7c3aed);
  display:grid; place-items:center; color:#fff; font-size:14px; }
.updated { margin-left:auto; font-size:12px; color:var(--muted); text-align:right; }
main { max-width:640px; margin:0 auto; padding:4px 14px 60px; }
.card { background:var(--card); border:1px solid var(--line); border-radius:14px; box-shadow:var(--shadow);
  padding:16px; margin-bottom:14px; position:relative; }
.kind { font-size:10.5px; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
  padding:3px 8px; border-radius:6px; display:inline-block; }
.kind.flight { background:var(--accent-soft); color:var(--accent); }
.kind.hotel { background:var(--amber-soft); color:var(--amber); }
h3 { font-size:15px; margin:8px 0 2px; line-height:1.35; letter-spacing:-.01em; }
.sub { color:var(--muted); font-size:12.5px; }
.price-row { display:flex; align-items:flex-end; gap:10px; margin-top:11px; }
.price { font-size:27px; font-weight:780; letter-spacing:-.03em; }
.unit { color:var(--muted); font-size:12.5px; padding-bottom:5px; }
.delta { font-size:12.5px; font-weight:700; padding:3px 8px; border-radius:7px; margin-bottom:4px; }
.delta.down { background:var(--green-soft); color:var(--green); }
.delta.up { background:color-mix(in srgb,var(--red) 14%,transparent); color:var(--red); }
.delta.flat { background:var(--line); color:var(--muted); }
.spark { margin-top:10px; width:100%; height:44px; }
.foot { display:flex; justify-content:space-between; margin-top:9px; font-size:12px; color:var(--muted); }
.target-hit { color:var(--green); font-weight:700; }
/* gate */
.gate { max-width:340px; margin:16vh auto 0; text-align:center; padding:0 20px; }
.gate .big { font-size:40px; }
.gate h1 { font-size:19px; margin:10px 0 4px; }
.gate p { color:var(--muted); font-size:13.5px; margin-bottom:16px; }
.gate input { width:100%; padding:12px 14px; border:1px solid var(--line); border-radius:12px;
  background:var(--card); color:var(--text); font-size:16px; text-align:center; letter-spacing:.04em; }
.gate input:focus { outline:none; border-color:var(--accent); }
.gate button { width:100%; margin-top:12px; padding:12px; border:none; border-radius:12px;
  background:var(--accent); color:#fff; font-size:15px; font-weight:650; cursor:pointer; }
.gate .err { color:var(--red); font-size:13px; margin-top:10px; min-height:18px; }
.hidden { display:none; }
</style>
</head>
<body>

<div class="gate" id="gate">
  <div class="big">🛩️</div>
  <h1>FareScout</h1>
  <p>Enter your passcode to see your tracked fares.</p>
  <input id="pass" type="password" placeholder="passcode" autocomplete="current-password">
  <button id="go">Unlock</button>
  <div class="err" id="err"></div>
</div>

<div class="hidden" id="app">
  <header>
    <div class="logo"><span class="mark">✈</span> FareScout</div>
    <div class="updated" id="updated"></div>
  </header>
  <main id="content"></main>
</div>

<script>
const $ = (s) => document.querySelector(s);
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

async function decrypt(b64, passcode) {
  const raw = Uint8Array.from(atob(b64.trim()), c => c.charCodeAt(0));
  const keyBits = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(passcode));
  const key = await crypto.subtle.importKey("raw", keyBits, "AES-GCM", false, ["decrypt"]);
  const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv: raw.slice(0, 12) }, key, raw.slice(12));
  return JSON.parse(new TextDecoder().decode(plain));
}

function fmt(v, kind) {
  if (v == null) return "—";
  const p = Number.isInteger(v) ? `$${v.toLocaleString()}` : `$${v.toFixed(2)}`;
  return p;
}

function spark(hist, w = 320, h = 44) {
  const pts = hist.filter(e => e.price != null);
  if (pts.length < 2) return `<svg class="spark" viewBox="0 0 ${w} ${h}"><line x1="0" y1="${h/2}" x2="${w}" y2="${h/2}" stroke="var(--line)" stroke-dasharray="3 4"/></svg>`;
  const vals = pts.map(e => e.price);
  const min = Math.min(...vals), max = Math.max(...vals), span = max - min || 1;
  const xy = pts.map((e, i) => [(i/(pts.length-1))*(w-8)+4, h-6-((e.price-min)/span)*(h-14)]);
  const path = xy.map((p,i) => `${i?"L":"M"}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(" ");
  const last = xy[xy.length-1];
  const col = vals[vals.length-1] > vals[0] ? "var(--red)" : "var(--green)";
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <path d="${path}" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round"/>
    <circle cx="${last[0]}" cy="${last[1]}" r="3" fill="${col}"/></svg>`;
}

function card(t) {
  const pts = t.history.filter(e => e.price != null);
  const cur = pts.length ? pts[pts.length-1].price : null;
  const prev = pts.length > 1 ? pts[pts.length-2].price : null;
  const low = pts.length ? Math.min(...pts.map(e => e.price)) : null;
  const unit = t.kind === "hotel" ? "/night" : (t.config.return_date ? "round trip" : "one way");
  let delta = `<span class="delta flat">tracking</span>`;
  if (prev != null && cur != null) {
    const d = cur - prev, pct = Math.abs(d/prev*100).toFixed(0);
    delta = Math.abs(d) < .5 ? `<span class="delta flat">no change</span>`
      : d < 0 ? `<span class="delta down">▼ ${pct}%</span>` : `<span class="delta up">▲ ${pct}%</span>`;
  }
  const hit = t.threshold != null && cur != null && cur <= t.threshold;
  const sub = t.kind === "flight"
    ? `${esc(t.config.seat || "economy")} · ${t.config.adults || 1} adult${(t.config.adults||1)>1?"s":""}${t.config.return_date ? ` · return ${esc(t.config.return_date)}` : ""}`
    : `${esc(t.config.checkin)} → ${esc(t.config.checkout)} · cheapest FHR/THC hotel`;
  return `<div class="card">
    <span class="kind ${t.kind}">${t.kind === "flight" ? "✈ Flight" : "🏨 FHR Hotel"}</span>
    <h3>${esc(t.label)}</h3>
    <div class="sub">${sub}</div>
    <div class="price-row">
      <span class="price">${fmt(cur, t.kind)}</span>
      <span class="unit">${cur != null ? unit + (t.kind === "hotel" ? " · /night" : "") : "no data yet"}</span>
      ${delta}
    </div>
    ${spark(t.history)}
    <div class="foot">
      <span>${hit ? `<span class="target-hit">🎯 at/below your $${t.threshold} target</span>` : `lowest seen ${fmt(low, t.kind)}${t.threshold != null ? ` · target $${t.threshold}` : ""}`}</span>
      <span>${pts.length} check${pts.length === 1 ? "" : "s"}</span>
    </div>
  </div>`;
}

function render(data) {
  $("#gate").classList.add("hidden");
  $("#app").classList.remove("hidden");
  const d = new Date(data.updated);
  $("#updated").textContent = "updated " + d.toLocaleString([], {month:"short", day:"numeric", hour:"numeric", minute:"2-digit"});
  $("#content").innerHTML = data.trackers.length
    ? data.trackers.map(card).join("")
    : `<div class="card">No trackers yet — add some in the FareScout app on your Mac.</div>`;
}

async function unlock(passcode, silent) {
  try {
    const r = await fetch("data.enc", { cache: "no-store" });
    if (!r.ok) throw new Error("no data yet");
    const data = await decrypt(await r.text(), passcode);
    localStorage.setItem("fs_pass", passcode);
    render(data);
  } catch (e) {
    localStorage.removeItem("fs_pass");
    if (!silent) $("#err").textContent = "Wrong passcode (or no data published yet).";
  }
}

$("#go").addEventListener("click", () => unlock($("#pass").value.trim()));
$("#pass").addEventListener("keydown", e => { if (e.key === "Enter") unlock($("#pass").value.trim()); });
const saved = localStorage.getItem("fs_pass");
if (saved) unlock(saved, true);
</script>
</body>
</html>
